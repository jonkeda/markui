<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="20" ry="20" fill="url(#bg)"/>

  <!-- Wireframe box (outer) using + corners and dashes -->
  <g stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top-left corner + -->
    <line x1="20" y1="28" x2="28" y2="28"/>
    <line x1="24" y1="24" x2="24" y2="32"/>
    <!-- Top border dashes -->
    <line x1="32" y1="28" x2="42" y2="28"/>
    <line x1="46" y1="28" x2="56" y2="28"/>
    <!-- Title area -->
    <text x="64" y="32" fill="#fff" font-family="Consolas,monospace" font-size="11" font-weight="bold" text-anchor="middle" stroke="none">Login</text>
    <line x1="76" y1="28" x2="86" y2="28"/>
    <line x1="90" y1="28" x2="100" y2="28"/>
    <!-- Top-right corner + -->
    <line x1="100" y1="28" x2="108" y2="28"/>
    <line x1="104" y1="24" x2="104" y2="32"/>

    <!-- Left border -->
    <line x1="24" y1="36" x2="24" y2="92"/>
    <!-- Right border -->
    <line x1="104" y1="36" x2="104" y2="92"/>

    <!-- Bottom-left corner + -->
    <line x1="20" y1="96" x2="28" y2="96"/>
    <line x1="24" y1="92" x2="24" y2="100"/>
    <!-- Bottom border dashes -->
    <line x1="32" y1="96" x2="46" y2="96"/>
    <line x1="50" y1="96" x2="64" y2="96"/>
    <line x1="68" y1="96" x2="82" y2="96"/>
    <line x1="86" y1="96" x2="100" y2="96"/>
    <!-- Bottom-right corner + -->
    <line x1="100" y1="96" x2="108" y2="96"/>
    <line x1="104" y1="92" x2="104" y2="100"/>
  </g>

  <!-- Input field < ________ > -->
  <g fill="none" stroke="#93C5FD" stroke-width="2" stroke-linecap="round">
    <line x1="34" y1="50" x2="38" y2="46"/>
    <line x1="34" y1="50" x2="38" y2="54"/>
    <line x1="42" y1="52" x2="88" y2="52" stroke-dasharray="3,3"/>
    <line x1="94" y1="50" x2="90" y2="46"/>
    <line x1="94" y1="50" x2="90" y2="54"/>
  </g>

  <!-- Button [ Submit ] -->
  <rect x="36" y="64" width="56" height="20" rx="3" ry="3" fill="#fff" fill-opacity="0.2" stroke="#fff" stroke-width="2"/>
  <text x="64" y="78" fill="#fff" font-family="Consolas,monospace" font-size="11" font-weight="bold" text-anchor="middle">Submit</text>
</svg>
